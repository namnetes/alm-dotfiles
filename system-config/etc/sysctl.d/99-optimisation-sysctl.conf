###################################################################
# Fonctions précédemment trouvées dans netbase
#

# Uncomment the next two lines to enable Spoof protection (reverse-path filter)
# Turn on Source Address Verification in all interfaces to
# prevent some spoofing attacks
#net.ipv4.conf.default.rp_filter=1
#net.ipv4.conf.all.rp_filter=1

# Uncomment the next line to enable TCP/IP SYN cookies
# See http://lwn.net/Articles/277146/
# Note: This may impact IPv6 TCP sessions too
#net.ipv4.tcp_syncookies=1

# Uncomment the next line to enable packet forwarding for IPv4
#net.ipv4.ip_forward=1

# Uncomment the next line to enable packet forwarding for IPv6
#  Enabling this option disables Stateless Address Autoconfiguration
#  based on Router Advertisements for this host
#net.ipv6.conf.all.forwarding=1


###################################################################
# Additional settings - these settings can improve the network
# security of the host and prevent against some network attacks
# including spoofing attacks and man in the middle attacks through
# redirection. Some network environments, however, require that these
# settings are disabled so review and enable them as needed.
#
# Do not accept ICMP redirects (prevent MITM attacks)
#net.ipv4.conf.all.accept_redirects = 0
#net.ipv4.conf.default.accept_redirects = 0
# _or_
# Accept ICMP redirects only for gateways listed in our default
# gateway list (enabled by default)
# net.ipv4.conf.all.secure_redirects = 1
#
# Do not send ICMP redirects (we are not a router)
#net.ipv4.conf.all.send_redirects = 0
#
# Log Martian Packets
#net.ipv4.conf.all.log_martians = 1
#

###################################################################
# Magic system request Key
# 0=disable, 1=enable all, >1 bitmask of sysrq functions
# See https://www.kernel.org/doc/html/latest/admin-guide/sysrq.html
# for what other values do
#kernel.sysrq=438

###################################################################
# 🌟 OPTIMISATIONS POUR 128 GO DE RAM (2025-11-16) 🌟
# Ces paramètres minimisent l'utilisation du swap et maximisent l'utilisation
# de la mémoire physique (RAM) pour le caching.

# 1. Gestion de la mémoire (RAM) - Optimisation pour grande quantité de RAM
# vm.swappiness (Défaut: 60) :
# Définit la tendance du noyau à utiliser l'espace de SWAP.
# 1 signifie que le noyau n'utilisera le swap que lorsque la RAM est absolument critique.
vm.swappiness = 1

# vm.vfs_cache_pressure (Défaut: 100) :
# Contrôle la conservation du cache d'inodes et de dentry (informations sur les fichiers et répertoires).
# Une valeur plus faible (50) permet de conserver plus de cache en RAM pour accélérer les opérations sur le système de fichiers.
vm.vfs_cache_pressure = 50

# vm.dirty_background_ratio (Défaut: 10) :
# Pourcentage de RAM auquel l'écriture progressive des données modifiées (dirty pages) vers le disque commence.
vm.dirty_background_ratio = 5

# vm.dirty_ratio (Défaut: 20) :
# Pourcentage maximal de RAM que les données modifiées peuvent occuper avant que le système ne bloque les I/O pour forcer l'écriture sur le disque.
vm.dirty_ratio = 10

###################################################################
# 🔒 RÉGLAGES DE SÉCURITÉ RECOMMANDÉS (2025-11-16) 🔒

# Active la protection anti-spoofing (Reverse Path Filtering)
# S'assurer que le paquet entrant vient d'une interface ayant une route vers l'adresse source.
net.ipv4.conf.default.rp_filter=1
net.ipv4.conf.all.rp_filter=1

# Active les SYN Cookies (protection contre les attaques SYN Flood)
net.ipv4.tcp_syncookies=1

# Ne pas accepter les redirections ICMP (prévention des attaques de type Man-In-The-Middle)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# Ne pas envoyer de redirections ICMP (si la machine n'est pas un routeur)
net.ipv4.conf.all.send_redirects = 0

# Enregistrer les paquets "Martiens" (paquets avec des adresses source/destination invalides ou impossibles)
net.ipv4.conf.all.log_martians = 1
